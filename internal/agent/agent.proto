syntax = "proto3";

package agent;

option go_package = "github.com/brickpop/secrets/internal/agent";

service Secrets {
  rpc Get(GetRequest)             returns (GetResponse);
  rpc List(ListRequest)           returns (ListResponse);
  rpc Set(SetRequest)             returns (SetResponse);
  rpc Delete(DeleteRequest)       returns (DeleteResponse);
  rpc Passwd(PasswdRequest)       returns (PasswdResponse);
  rpc SetAgentTTL(SetAgentTTLRequest) returns (SetAgentTTLResponse);
  rpc Rename(RenameRequest)           returns (RenameResponse);
}

message GetRequest    { string key = 1; }
message GetResponse   { string value = 1; }

message ListRequest  {}
message ListResponse { repeated string keys = 1; }

message SetRequest {
  string key        = 1;
  string value      = 2;
  string passphrase = 3;
}
message SetResponse {}

message DeleteRequest {
  string key        = 1;
  string passphrase = 2;
}
message DeleteResponse {}

message PasswdRequest {
  string passphrase     = 1;
  string new_passphrase = 2;
}
message PasswdResponse {}

// seconds: -1 = stop immediately, 0 = no expiry, >0 = lifetime in seconds
message SetAgentTTLRequest  { int64 seconds = 1; }
message SetAgentTTLResponse {}

message RenameRequest {
  string from       = 1;
  string to         = 2;
  string passphrase = 3;
}
message RenameResponse {}
