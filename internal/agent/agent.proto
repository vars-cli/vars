syntax = "proto3";

package agent;

option go_package = "github.com/vars-cli/vars/internal/agent";

service Vars {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Set(SetRequest) returns (SetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Passwd(PasswdRequest) returns (PasswdResponse);
  rpc Rename(RenameRequest) returns (RenameResponse);
  rpc History(HistoryRequest) returns (HistoryResponse);
  rpc SetAgentTTL(SetAgentTTLRequest) returns (SetAgentTTLResponse);
}

message GetRequest {
  string key = 1;
}
message GetResponse {
  string value = 1;
}

message ListRequest {}
message ListResponse {
  repeated string keys = 1;
}

message SetRequest {
  string key = 1;
  string value = 2;
  string passphrase = 3;
}
message SetResponse {}

message DeleteRequest {
  string key = 1;
  string passphrase = 2;
}
message DeleteResponse {}

message HistoryRequest {
  string key = 1;
}
message HistoryResponse {
  repeated string keys = 1; // actual store key names (KEY~N), newest first
  repeated string values = 2; // corresponding values, newest first
}

message PasswdRequest {
  string passphrase = 1;
  string new_passphrase = 2;
}
message PasswdResponse {}

// seconds: -1 = stop immediately, 0 = no expiry, >0 = lifetime in seconds
message SetAgentTTLRequest {
  int64 seconds = 1;
}
message SetAgentTTLResponse {}

message RenameRequest {
  string from = 1;
  string to = 2;
  string passphrase = 3;
}
message RenameResponse {}
